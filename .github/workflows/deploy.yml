name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Repo is served at https://digipete.github.io/public-value-connect-5f341df4/
          VITE_BASE_PATH: /public-value-connect-5f341df4/
          # Produce a fully static bundle (prerendered HTML) instead of the
          # default Cloudflare Worker output.
          NITRO_PRESET: static
        run: bun run build

      - name: Prepare Pages artifact
        run: |
          # With the static preset, Nitro prerenders every route into
          # dist/public/. Fall back to dist/client if that's absent.
          PUBLISH_DIR="dist/public"
          if [ ! -d "$PUBLISH_DIR" ]; then PUBLISH_DIR="dist/client"; fi
          echo "PUBLISH_DIR=$PUBLISH_DIR" >> "$GITHUB_ENV"
          # SPA fallback so refreshing a deep link doesn't 404.
          if [ -f "$PUBLISH_DIR/index.html" ]; then
            cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
          fi
          touch "$PUBLISH_DIR/.nojekyll"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
