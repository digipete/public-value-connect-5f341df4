name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          # Repo is served at https://digipete.github.io/public-value-connect-5f341df4/
          VITE_BASE_PATH: /public-value-connect-5f341df4/
        run: bunx vite build --config vite.pages.config.ts

      - name: Prepare Pages artifact
        run: |
          PUBLISH_DIR="pages-dist"
          if [ ! -f "$PUBLISH_DIR/index.html" ] && [ -f "$PUBLISH_DIR/index.pages.html" ]; then
            mv "$PUBLISH_DIR/index.pages.html" "$PUBLISH_DIR/index.html"
          fi

          # SPA fallback so refreshing a deep link doesn't 404.
          if [ -f "$PUBLISH_DIR/index.html" ]; then
            cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
            for route in \
              role \
              patient patient/appointment patient/confirmation patient/options patient/timeline \
              provider provider/capacity provider/demand provider/improve provider/profile \
              supplier supplier/changes supplier/conformance supplier/object \
              national national/impact national/learning; do
              mkdir -p "$PUBLISH_DIR/$route"
              cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/$route/index.html"
            done
          fi
          touch "$PUBLISH_DIR/.nojekyll"

          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -R "$PUBLISH_DIR"/. pages-artifact/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
