name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Repo is served at https://<user>.github.io/public-value-connect/
          # (and proxied via hallett.life/public-value-connect/).
          VITE_BASE_PATH: /public-value-connect/
        run: bun run build

      - name: Prepare Pages artifact
        run: |
          # Nitro emits static client assets to dist/client and the Worker
          # bundle to dist/server. GitHub Pages only needs the client dir.
          cp dist/client/index.html dist/client/404.html
          touch dist/client/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
