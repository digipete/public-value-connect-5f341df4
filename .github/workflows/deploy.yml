name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static SPA
        env:
          VITE_BASE_PATH: /public-value-connect-5f341df4/
        run: bunx vite build --config vite.pages.config.ts

      - name: Assemble Pages artifact
        run: |
          OUT=pages-artifact
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cp -R dist-pages/. "$OUT"/
          # Vite emits the entry as index.pages.html; GH Pages needs index.html
          if [ -f "$OUT/index.pages.html" ] && [ ! -f "$OUT/index.html" ]; then
            mv "$OUT/index.pages.html" "$OUT/index.html"
          fi
          # Copy public assets (favicon etc.)
          if [ -d public ]; then
            cp -R public/. "$OUT"/ 2>/dev/null || true
          fi
          # SPA fallback so deep-link refresh works on GitHub Pages
          cp "$OUT/index.html" "$OUT/404.html"
          touch "$OUT/.nojekyll"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
