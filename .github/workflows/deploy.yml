name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        env:
          # Repo is served at https://digipete.github.io/public-value-connect-5f341df4/
          VITE_BASE_PATH: /public-value-connect-5f341df4/
          # Produce static browser assets for GitHub Pages.
          NITRO_PRESET: static
        run: |
          set +e
          bun run build
          BUILD_EXIT=$?
          set -e

          # The TanStack/Nitro build currently writes the static Pages-ready
          # browser bundle before a server-only SSR packaging step fails in CI.
          # For GitHub Pages we only need that static artifact.
          if [ "$BUILD_EXIT" -ne 0 ] && [ ! -d ".output/public" ] && [ ! -d "dist/client" ]; then
            exit "$BUILD_EXIT"
          fi

      - name: Prepare Pages artifact
        run: |
          # Vite/Nitro writes static assets to .output/public. Fall back to
          # dist/client for older local output layouts.
          PUBLISH_DIR=".output/public"
          if [ ! -d "$PUBLISH_DIR" ]; then PUBLISH_DIR="dist/client"; fi

          if [ ! -f "$PUBLISH_DIR/index.html" ]; then
            ENTRY_JS="$(basename "$(ls "$PUBLISH_DIR"/assets/index-*.js | head -n 1)")"
            STYLES_CSS="$(basename "$(ls "$PUBLISH_DIR"/assets/styles-*.css | head -n 1)")"
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <meta name="viewport" content="width=device-width, initial-scale=1" />' \
              '    <title>Open Appointments Exchange — NHS prototype</title>' \
              '    <meta name="description" content="A fictional NHS proof of concept exploring how patients, providers and suppliers can coordinate around a shared appointment object." />' \
              '    <link rel="icon" href="/public-value-connect-5f341df4/favicon.ico" type="image/x-icon" />' \
              "    <link rel=\"stylesheet\" crossorigin href=\"/public-value-connect-5f341df4/assets/$STYLES_CSS\" />" \
              "    <script type=\"module\" crossorigin src=\"/public-value-connect-5f341df4/assets/$ENTRY_JS\"></script>" \
              '  </head>' \
              '  <body></body>' \
              '</html>' \
              > "$PUBLISH_DIR/index.html"
          fi

          # SPA fallback so refreshing a deep link doesn't 404.
          if [ -f "$PUBLISH_DIR/index.html" ]; then
            cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
            for route in \
              role \
              patient patient/appointment patient/confirmation patient/options patient/timeline \
              provider provider/capacity provider/demand provider/improve provider/profile \
              supplier supplier/changes supplier/conformance supplier/object \
              national national/impact national/learning; do
              mkdir -p "$PUBLISH_DIR/$route"
              cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/$route/index.html"
            done
          fi
          touch "$PUBLISH_DIR/.nojekyll"

          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -R "$PUBLISH_DIR"/. pages-artifact/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
